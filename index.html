<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SBSAX Studio</title>
<link rel="manifest" href="data:application/json,{}">
<style>
:root{
  --bg:#0a0a0a;
  --bg2:#141414;
  --surface:#1a1a1a;
  --surface2:#212121;
  --border:rgba(255,255,255,0.1);
  --border-light:rgba(255,255,255,0.18);
  --text:#ffffff;
  --text-dim:rgba(255,255,255,0.6);
  --text-faint:rgba(255,255,255,0.38);
  --accent:#D31F53;
  --accent-orange:#F07A29;
  --accent-pink:#D31F53;
  --accent-violet:#4B3C8B;
  --accent-gradient:linear-gradient(100deg, #F07A29 0%, #D31F53 50%, #4B3C8B 100%);
  --accent-dim:rgba(211,31,83,0.14);
  --accent-border:rgba(211,31,83,0.45);
  --danger:#E24B4A;
  --danger-dim:rgba(226,75,74,0.12);
  --success:#5DCAA5;
  --success-dim:rgba(93,202,165,0.12);
  --radius:14px;
  --radius-sm:9px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;-webkit-font-smoothing:antialiased;height:100%;overflow-x:hidden;}
#app{min-height:100vh;display:flex;flex-direction:column;padding-bottom:90px;}
button{font-family:inherit;cursor:pointer;}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--text);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;width:100%;outline:none;}
input:focus,select:focus,textarea:focus{border-color:var(--accent-border);}
input::placeholder,textarea::placeholder{color:var(--text-faint);}
label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:6px;letter-spacing:0.02em;text-transform:uppercase;}
.field{margin-bottom:14px;}
.row{display:flex;gap:10px;}
.row>*{flex:1;}

/* Top bar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(10,10,10,0.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:16px 18px;display:flex;align-items:center;justify-content:space-between;}
.topbar .brand{font-size:13px;letter-spacing:0.18em;color:var(--accent);font-weight:600;display:flex;align-items:center;gap:8px;}
.topbar .title{font-size:17px;font-weight:600;}
.icon-btn{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:16px;flex-shrink:0;}
.back-row{display:flex;align-items:center;gap:10px;}

/* Content */
.content{flex:1;padding:18px;max-width:560px;width:100%;margin:0 auto;}

/* Cards */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 17px;margin-bottom:12px;}
.card-tap{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.card-tap:active{background:var(--surface2);}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-sm);padding:13px 18px;font-size:15px;font-weight:600;border:1px solid var(--border-light);background:var(--surface2);color:var(--text);width:100%;}
.btn:active{transform:scale(0.98);}
.btn-accent{background:var(--accent-gradient);border-color:transparent;color:#ffffff;}
.btn-outline-accent{background:var(--accent-dim);border-color:var(--accent-border);color:#f0729a;}
.btn-danger{background:var(--danger-dim);border-color:rgba(226,75,74,0.4);color:var(--danger);}
.btn-ghost{background:transparent;border-color:transparent;color:var(--text-dim);}
.btn-sm{padding:9px 14px;font-size:13px;width:auto;}

/* FAB */
.fab{position:fixed;bottom:24px;right:20px;width:58px;height:58px;border-radius:50%;background:var(--accent-gradient);color:#ffffff;border:none;font-size:26px;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(211,31,83,0.35);z-index:60;}
.fab:active{transform:scale(0.94);}

/* Bottom nav */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:rgba(10,10,10,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;z-index:55;padding-bottom:env(safe-area-inset-bottom);}
.navitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 0 8px;color:var(--text-faint);font-size:11px;border:none;background:none;}
.navitem.active{color:#e84a82;}
.navicon{font-size:20px;line-height:1;}

/* Lists */
.list-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border);gap:12px;}
.list-item:last-child{border-bottom:none;}
.list-main{flex:1;min-width:0;}
.list-title{font-size:15px;font-weight:600;margin:0 0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-sub{font-size:13px;color:var(--text-dim);margin:0;}
.list-amount{font-size:15px;font-weight:600;flex-shrink:0;}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;letter-spacing:0.02em;}
.badge-draft{background:var(--surface2);color:var(--text-dim);}
.badge-sent{background:rgba(133,183,235,0.12);color:#85B7EB;}
.badge-accepted{background:var(--success-dim);color:var(--success);}
.badge-paid{background:var(--success-dim);color:var(--success);}
.badge-pending{background:var(--accent-dim);color:#f0729a;}
.badge-overdue{background:var(--danger-dim);color:var(--danger);}

/* Empty state */
.empty{text-align:center;padding:60px 20px;color:var(--text-faint);}
.empty .emoji{font-size:40px;margin-bottom:14px;opacity:0.6;}
.empty p{font-size:14px;margin:0;}

/* Section title */
.section-title{font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:var(--text-faint);margin:22px 0 10px;font-weight:600;}
.section-title:first-child{margin-top:0;}

/* Stat grid */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px;}
.stat-label{font-size:11px;color:var(--text-faint);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
.stat-value{font-size:22px;font-weight:700;}
.stat-value.accent{background:var(--accent-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}

/* Line items editor */
.line-item{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;}
.line-item-top{display:flex;gap:8px;margin-bottom:8px;}
.line-item-bottom{display:flex;gap:8px;align-items:center;}
.line-item-bottom input{flex:1;}
.remove-line{width:34px;height:34px;border-radius:8px;background:var(--danger-dim);color:var(--danger);border:none;font-size:16px;flex-shrink:0;}

/* Modal / drawer */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:80;display:flex;align-items:flex-end;}
.drawer{background:var(--bg2);width:100%;max-height:85vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:20px 18px 30px;border-top:1px solid var(--border-light);}
.drawer-handle{width:36px;height:4px;background:var(--border-light);border-radius:4px;margin:0 auto 16px;}

/* Onboarding */
.onboard-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:30px 24px;max-width:480px;margin:0 auto;}
.onboard-logo{text-align:center;margin-bottom:8px;}
.onboard-logo .mark{font-size:13px;letter-spacing:0.2em;color:var(--accent);font-weight:700;}
.onboard-title{font-size:26px;font-weight:700;text-align:center;margin:6px 0 6px;}
.onboard-sub{font-size:14px;color:var(--text-dim);text-align:center;margin:0 0 32px;}
.step-dots{display:flex;justify-content:center;gap:6px;margin-bottom:28px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--border-light);}
.dot.active{background:var(--accent);width:18px;border-radius:4px;}

/* Toast */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border-light);color:var(--text);padding:11px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.4);}

/* PDF preview text doc style elements */
.divider{height:1px;background:var(--border);margin:14px 0;}
.kv-row{display:flex;justify-content:space-between;padding:6px 0;font-size:14px;}
.kv-row .k{color:var(--text-dim);}

.total-box{background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:var(--radius-sm);padding:14px 16px;margin-top:6px;}
.total-row{display:flex;justify-content:space-between;align-items:center;}
.total-row .label{font-size:13px;color:#f0729a;font-weight:600;text-transform:uppercase;letter-spacing:0.04em;}
.total-row .value{font-size:24px;font-weight:700;background:var(--accent-gradient);-webkit-background-clip:text;background-clip:text;color:transparent;}

textarea{resize:vertical;min-height:70px;}

a{color:var(--accent);}

.upload-box{border:1.5px dashed var(--border-light);border-radius:var(--radius-sm);padding:18px;text-align:center;color:var(--text-dim);font-size:13px;}
.logo-preview{width:60px;height:60px;border-radius:12px;object-fit:cover;border:1px solid var(--border);}

.brand-logo-symbol{height:22px;width:auto;display:block;}
.onboard-logo-full{width:100%;max-width:220px;margin:0 auto 4px;display:block;}
</style>
</head>

function loadDB(){
  try{
    const raw = localStorage.getItem(DB_KEY);
    if(raw){
      const parsed = JSON.parse(raw);
      if(!parsed.profile) parsed.profile = defaultProfile();
      return parsed;
    }
  }catch(e){}
  return { profile: defaultProfile(), clients:[], rates:[], documents:[], nextNum:1 };
}

}

function uid(){
  return Date.now().toString(36)+Math.random().toString(36).slice(2,8);
}
function fmtMoney(n){
  n = Number(n)||0;
  return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac';
}
function fmtDate(iso){
  if(!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function todayISO(){
  return new Date().toISOString().slice(0,10);
}
function addDays(iso, days){
  const d = new Date(iso);
  d.setDate(d.getDate()+days);
  return d.toISOString().slice(0,10);
}
function esc(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function toast(msg){
  const t = document.createElement('div');
  t.className='toast';
  t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>{ t.style.transition='opacity 0.3s'; t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 1800);
}

// ============================================================
// NAVIGATION
// ============================================================
let viewStack = [];
let currentView = DB.profile ? 'home' : 'onboard';
let currentParams = {};

function navigate(view, params={}){
  viewStack.push({view: currentView, params: currentParams});
  currentView = view;
  currentParams = params;
  render();
  window.scrollTo(0,0);
}
function replaceView(view, params={}){
  currentView = view;
  currentParams = params;
  render();
  window.scrollTo(0,0);
}
function goBack(){
  if(viewStack.length){
    const prev = viewStack.pop();
    currentView = prev.view;
    currentParams = prev.params;
    render();
    window.scrollTo(0,0);
  } else {
    currentView='home';
    render();
  }
}

window.addEventListener('popstate', ()=>{ goBack(); });

// ============================================================
function getRate(id){ return DB.rates.find(r=>r.id===id); }
function getClient(id){ return DB.clients.find(c=>c.id===id); }
function getDoc(id){ return DB.documents.find(d=>d.id===id); }

function docTotal(doc){
  let total = 0;
  (doc.lines||[]).forEach(l=>{ total += (Number(l.qty)||0) * (Number(l.price)||0); });
  return total;
}

function nextDocNumber(type){
  const year = new Date().getFullYear();
  const prefix = type==='facture' ? 'F' : 'D';
  const count = DB.documents.filter(d=>d.type===type && (d.num||'').includes(String(year))).length + 1;
  return `${prefix}${year}-${String(count).padStart(3,'0')}`;
}

// RENDER ROOT
// ============================================================
function render(){
  const app = document.getElementById('app');
  if(!DB.profile && currentView !== 'onboard'){ currentView='onboard'; }
  switch(currentView){
    case 'onboard': app.innerHTML = viewOnboard(); bindOnboard(); break;
    case 'home': app.innerHTML = viewHome(); bindHome(); break;
    case 'clients': app.innerHTML = viewClients(); bindClients(); break;
    case 'client-form': app.innerHTML = viewClientForm(currentParams); bindClientForm(currentParams); break;
    case 'rates': app.innerHTML = viewRates(); bindRates(); break;
    case 'rate-form': app.innerHTML = viewRateForm(currentParams); bindRateForm(currentParams); break;
    case 'documents': app.innerHTML = viewDocuments(); bindDocuments(); break;
    case 'doc-form': app.innerHTML = viewDocForm(currentParams); bindDocForm(currentParams); break;
    case 'doc-detail': app.innerHTML = viewDocDetail(currentParams); bindDocDetail(currentParams); break;
    case 'settings': app.innerHTML = viewSettings(); bindSettings(); break;
    default: app.innerHTML = viewHome(); bindHome();
  }
}

function bottomNav(active){
  const items = [
    {id:'home', icon:ICONS.home, label:'Accueil'},
    {id:'clients', icon:ICONS.users, label:'Clients'},
    {id:'documents', icon:ICONS.doc, label:'Devis/Factures'},
    {id:'rates', icon:ICONS.tag, label:'Tarifs'},
  ];
  return `<div class="bottomnav">
    ${items.map(it=>`
      <button class="navitem ${active===it.id?'active':''}" data-nav="${it.id}">
        <span class="navicon">${it.icon}</span>
        <span>${it.label}</span>
      </button>
    `).join('')}
  </div>`;
}
function bindBottomNav(){
  document.querySelectorAll('[data-nav]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      viewStack = [];
      replaceView(btn.dataset.nav);
    });
  });
}

      </div>

    () => `

        <button class="btn btn-accent" id="ob-next">Continuer</button>
      </div>
    `,
    () => `
      <img src="${LOGO_SYMBOL}" style="height:36px; display:block; margin:0 auto 14px;" alt="SBSAX">
      <div class="onboard-title">Infos l\u00e9gales</div>
      <div class="onboard-sub">Obligatoires sur tes factures (micro-entreprise).</div>
      <div class="field"><label>SIREN / SIRET</label><input type="text" id="ob-siret" placeholder="884661125" value="${esc(onboardData.siret||'')}"></div>
      <div class="field"><label>R\u00e9gime TVA</label><input type="text" id="ob-tva" placeholder="TVA non applicable \u2014 art. 293 B du CGI" value="${esc(onboardData.tva||'TVA non applicable \u2014 art. 293 B du CGI')}"></div>
      <div class="row">
        <div class="field"><label>Acompte par d\u00e9faut (%)</label><input type="number" id="ob-acompte" placeholder="30" value="${esc(onboardData.acompte||'30')}"></div>
        <div class="field"><label>D\u00e9placement inclus (km)</label><input type="number" id="ob-km" placeholder="30" value="${esc(onboardData.km||'30')}"></div>
      </div>
      <div class="row">
        <button class="btn btn-ghost" id="ob-prev">Retour</button>
        <button class="btn btn-accent" id="ob-finish">C'est parti</button>
      </div>
    `
  ];
  return `<div class="onboard-wrap">
    <div class="step-dots">${[1,2,3].map(n=>`<span class="dot ${n===onboardStep?'active':''}"></span>`).join('')}</div>
    ${steps[onboardStep-1]()}
  </div>`;
}

function collectOnboardStep(){
  if(onboardStep===1){
    onboardData.nom = document.getElementById('ob-nom').value.trim();
    onboardData.activite = document.getElementById('ob-activite').value.trim();
  } else if(onboardStep===2){
    onboardData.email = document.getElementById('ob-email').value.trim();
    onboardData.tel = document.getElementById('ob-tel').value.trim();
    onboardData.adresse = document.getElementById('ob-adresse').value.trim();
  } else if(onboardStep===3){
    onboardData.siret = document.getElementById('ob-siret').value.trim();
    onboardData.tva = document.getElementById('ob-tva').value.trim();
    onboardData.acompte = document.getElementById('ob-acompte').value.trim();
    onboardData.km = document.getElementById('ob-km').value.trim();
  }
}

function bindOnboard(){
  const next = document.getElementById('ob-next');
  const prev = document.getElementById('ob-prev');
  const finish = document.getElementById('ob-finish');
  if(next) next.addEventListener('click', ()=>{
    collectOnboardStep();
    if(onboardStep===1 && !onboardData.nom){ toast('Indique ton nom'); return; }
    onboardStep++; render();
  });
  if(prev) prev.addEventListener('click', ()=>{ collectOnboardStep(); onboardStep--; render(); });
  if(finish) finish.addEventListener('click', ()=>{
    collectOnboardStep();
    DB.profile = {
      nom: onboardData.nom || 'SBSAX',
      activite: onboardData.activite || 'DJ / Saxophoniste',
      email: onboardData.email || '',
      tel: onboardData.tel || '',
      adresse: onboardData.adresse || '',
      siret: onboardData.siret || '',
      tva: onboardData.tva || 'TVA non applicable \u2014 art. 293 B du CGI',
      acompte: onboardData.acompte || '30',
      km: onboardData.km || '30',
      logo: ''
    };
    saveDB();
    toast('Profil cr\u00e9\u00e9 \uD83C\uDF89');
    replaceView('home');
  });
}

  let total = 0;
  document.querySelectorAll('#df-lines .line-item').forEach(li=>{
    const qty = parseFloat(li.querySelector('.ln-qty').value)||0;
    const price = parseFloat(li.querySelector('.ln-price').value)||0;
    total += qty*price;
  });
  document.getElementById('df-total').textContent = fmtMoney(total);
}

function syncLinesFromDOM(){
  const lines = [];
  document.querySelectorAll('#df-lines .line-item').forEach(li=>{
    lines.push({
      id: li.dataset.lineId,
      label: li.querySelector('.ln-label').value.trim(),
      qty: parseFloat(li.querySelector('.ln-qty').value)||0,
      price: parseFloat(li.querySelector('.ln-price').value)||0,
    });
  });
  docFormState.lines = lines;
}

function bindDocForm(params){
  bindTopBar();
  const d = docFormState;

  document.getElementById('df-pick-client').addEventListener('click', ()=>{
    syncLinesFromDOM();
    showClientPicker((clientId)=>{
      docFormState.clientId = clientId;
      render();
    });
  });

  document.getElementById('df-add-line').addEventListener('click', ()=>{
    syncLinesFromDOM();
    docFormState.lines.push({id:uid(), label:'', qty:1, price:0});
    render();
  });

  document.getElementById('df-pick-rate').addEventListener('click', ()=>{
    syncLinesFromDOM();
    showRatePicker((rate)=>{
      docFormState.lines.push({id:uid(), label:rate.label, qty:1, price:rate.price});
      render();
    });
  });

  document.querySelectorAll('[data-remove-line]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      syncLinesFromDOM();
      docFormState.lines = docFormState.lines.filter(l=>l.id!==btn.dataset.removeLine);
      if(docFormState.lines.length===0) docFormState.lines.push({id:uid(), label:'', qty:1, price:0});
      render();
    });
  });

  document.querySelectorAll('#df-lines .ln-qty, #df-lines .ln-price').forEach(inp=>{
    inp.addEventListener('input', recalcDocFormTotal);
  });

  document.getElementById('df-save').addEventListener('click', ()=>{
    syncLinesFromDOM();
    docFormState.num = document.getElementById('df-num').value.trim();
    docFormState.date = document.getElementById('df-date').value;
    docFormState.validUntil = document.getElementById('df-valid').value;
    docFormState.eventDate = document.getElementById('df-eventdate').value;
    docFormState.eventLocation = document.getElementById('df-eventloc').value.trim();
    docFormState.notes = document.getElementById('df-notes').value.trim();

    if(!docFormState.clientId){ toast('S\u00e9lectionne un client'); return; }
    const validLines = docFormState.lines.filter(l=>l.label.trim());
    if(validLines.length===0){ toast('Ajoute au moins une prestation'); return; }
    docFormState.lines = validLines;

    const existing = getDoc(docFormState.id);
    if(existing){
      Object.assign(existing, docFormState);
    } else {
      if(!docFormState.status) docFormState.status = 'draft';
      DB.documents.push(docFormState);
    }
    saveDB();
    const savedId = docFormState.id;
    docFormState = null;
    toast('Document enregistr\u00e9');
    viewStack = viewStack.filter(v=>v.view!=='doc-form');
    replaceView('doc-detail',{id:savedId});
  });
}

function showClientPicker(onPick){
  const overlay = document.createElement('div');
  overlay.className='overlay';
  const clients = [...DB.clients].sort((a,b)=>a.nom.localeCompare(b.nom));
  overlay.innerHTML = `
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="section-title">Choisir un client</div>
      ${clients.length===0 ? `<p style="color:var(--text-dim); font-size:14px;">Aucun client. Ajoute-en un depuis l'onglet Clients.</p>` : clients.map(c=>`
        <div class="list-item" data-pick-client="${c.id}" style="cursor:pointer;">
          <div class="list-main"><p class="list-title">${esc(c.nom)}</p><p class="list-sub">${esc(c.tel||c.email||'')}</p></div>
        </div>
      `).join('')}
      <button class="btn btn-ghost" id="picker-close" style="margin-top:14px;">Fermer</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });

  overlay.querySelectorAll('[data-pick-client]').forEach(el=>{
    el.addEventListener('click', ()=>{ overlay.remove(); onPick(el.dataset.pickClient); });
  });
}

function showRatePicker(onPick){
  const overlay = document.createElement('div');
  overlay.className='overlay';
  const rates = [...DB.rates].sort((a,b)=>a.label.localeCompare(b.label));
  overlay.innerHTML = `
    <div class="drawer">
      <div class="drawer-handle"></div>
      <div class="section-title">Choisir un tarif</div>
      ${rates.length===0 ? `<p style="color:var(--text-dim); font-size:14px;">Aucun tarif enregistr\u00e9. Ajoute-en un depuis l'onglet Tarifs.</p>` : rates.map(r=>`
        <div class="list-item" data-pick-rate="${r.id}" style="cursor:pointer;">

        </div>
      `).join('')}
      <button class="btn btn-ghost" id="picker-close" style="margin-top:14px;">Fermer</button>
    </div>
  `;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', (e)=>{ if(e.target===overlay) overlay.remove(); });
  document.getElementById('picker-close').addEventListener('click', ()=>overlay.remove());
  overlay.querySelectorAll('[data-pick-rate]').forEach(el=>{
    el.addEventListener('click', ()=>{ overlay.remove(); onPick(getRate(el.dataset.pickRate)); });
  });
}

              <p class="list-title" style="white-space:normal;">${esc(l.label)}</p>

        `).join('')}
      </div>

      <div style="margin-top:24px; display:flex; flex-direction:column; gap:10px;">
        <button class="btn btn-accent" id="dd-pdf">${ICONS.download} T\u00e9l\u00e9charger le PDF</button>
        <button class="btn" id="dd-edit">${ICONS.edit} Modifier</button>
        ${d.type==='devis' && d.status==='accepted' ? `<button class="btn btn-outline-accent" id="dd-to-facture">Convertir en facture</button>` : ''}
        <button class="btn btn-danger" id="dd-delete">${ICONS.trash} Supprimer</button>
      </div>

function bindDocDetail(params){
  bindTopBar();
  const d = getDoc(params.id);
  if(!d) return;

  document.querySelectorAll('[data-status]').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      d.status = btn.dataset.status;
      saveDB();
      render();
    });
  });

  document.getElementById('dd-pdf').addEventListener('click', ()=>{
    generatePDF(d);
  });

  document.getElementById('dd-edit').addEventListener('click', ()=>{
    docFormState = null;
    navigate('doc-form', {id:d.id, type:d.type});
  });

  const toFacture = document.getElementById('dd-to-facture');
  if(toFacture) toFacture.addEventListener('click', ()=>{
    const newDoc = JSON.parse(JSON.stringify(d));
    newDoc.id = uid();
    newDoc.type = 'facture';
    newDoc.num = nextDocNumber('facture');
    newDoc.date = todayISO();
    newDoc.validUntil = addDays(todayISO(), 30);
    newDoc.status = 'pending';
    DB.documents.push(newDoc);
    saveDB();
    toast('Facture cr\u00e9\u00e9e');
    replaceView('doc-detail', {id:newDoc.id});
  });

  document.getElementById('dd-delete').addEventListener('click', ()=>{
    if(confirm('Supprimer ce document ?')){
      DB.documents = DB.documents.filter(x=>x.id!==d.id);
      saveDB();
      toast('Document supprim\u00e9');
      goBack();
    }
  });
}

// ============================================================
// PDF GENERATION
// ============================================================
function generatePDF(d){
  if(typeof window.jspdf === 'undefined'){
    toast('Le module PDF charge encore, r\u00e9essaie dans 2s');
    return;
  }
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const p = DB.profile || {};
  const client = getClient(d.clientId) || {};
  const W = 210, H = 297;
  const ml = 15, mr = 15;

  // Color palette (RGB)
  const DARK = [10,10,10];
  const ACCENT = [211,31,83];
  const WHITE = [255,255,255];
  const GRAY = [140,140,140];
  const LIGHTGRAY = [230,230,230];
  const ROWALT = [245,245,245];

  function sf(size, style, color){
    doc.setFontSize(size);
    doc.setFont('helvetica', style||'normal');
    if(color) doc.setTextColor(color[0],color[1],color[2]);
    else doc.setTextColor(0,0,0);
  }
  function rc(x,y,w,h,color){
    doc.setFillColor(color[0],color[1],color[2]);
    doc.rect(x,y,w,h,'F');
  }
  function ln(x1,y1,x2,y2,color,width){
    doc.setDrawColor(color[0],color[1],color[2]);
    doc.setLineWidth(width||0.2);
    doc.line(x1,y1,x2,y2);
  }

  // HEADER (dark band)
  rc(0,0,W,38,DARK);
  try{
    doc.addImage(LOGO_FULL_WHITE, 'PNG', ml, 6, 32, 20.4);
  }catch(e){}
  sf(16,'bold',WHITE);
  doc.text(p.nom || 'SBSAX', ml+38, 18);
  sf(9,'normal',[200,200,200]);
  doc.text(p.activite || 'DJ / Saxophoniste', ml+38, 24);

  sf(9,'normal',[200,200,200]);
  const headerRight = [];
  if(p.email) headerRight.push(p.email);
  if(p.tel) headerRight.push(p.tel);
  headerRight.forEach((line,i)=>{
    doc.text(line, W-mr, 14+i*5, {align:'right'});
  });

  // DOC TITLE BLOCK
  let y = 50;
  sf(20,'bold',[20,20,20]);
  doc.text(d.type==='facture' ? 'FACTURE' : 'DEVIS', ml, y);
  sf(11,'normal',GRAY);
  doc.text(esc2(d.num), W-mr, y, {align:'right'});
  y += 10;

  ln(ml, y, W-mr, y, LIGHTGRAY, 0.3);
  y += 8;

  // Two columns: client / dates
  const colW = (W-ml-mr-10)/2;
  sf(8,'bold',GRAY);
  doc.text('CLIENT', ml, y);
  sf(8,'bold',GRAY);
  doc.text(d.type==='facture' ? 'FACTURE' : 'DEVIS', ml+colW+10, y);
  y += 6;

  sf(11,'bold',[20,20,20]);
  doc.text(client.nom || 'Client', ml, y);
  sf(9,'normal',[20,20,20]);
  doc.text(`Date \u00b7 ${fmtDate2(d.date)}`, ml+colW+10, y);
  y += 5;

  sf(9,'normal',GRAY);
  let yc = y;
  if(client.adresse){ const ls=doc.splitTextToSize(client.adresse, colW); doc.text(ls, ml, yc); yc += 4.5*ls.length; }
  if(client.email){ doc.text(client.email, ml, yc); yc += 4.5; }
  if(client.tel){ doc.text(client.tel, ml, yc); yc += 4.5; }

  if(d.validUntil){
    doc.text(`${d.type==='facture'?'\u00c9ch\u00e9ance':'Valide jusqu\u2019au'} \u00b7 ${fmtDate2(d.validUntil)}`, ml+colW+10, y);
    y += 5;
  }
  if(d.eventDate){
    doc.text(`\u00c9v\u00e8nement \u00b7 ${fmtDate2(d.eventDate)}`, ml+colW+10, y);
    y += 5;
  }
  if(d.eventLocation){
    const ls = doc.splitTextToSize(`Lieu \u00b7 ${d.eventLocation}`, colW);
    doc.text(ls, ml+colW+10, y);
    y += 4.5*ls.length;
  }

  y = Math.max(yc, y) + 8;

  // TABLE HEADER
  rc(ml, y, W-ml-mr, 9, DARK);
  sf(9,'bold',WHITE);
  doc.text('PRESTATION', ml+3, y+6);
  doc.text('QT\u00c9', W-mr-58, y+6, {align:'center'});
  doc.text('PRIX UNIT.', W-mr-32, y+6, {align:'right'});
  doc.text('TOTAL', W-mr-3, y+6, {align:'right'});
  y += 9;

  // TABLE ROWS
  d.lines.forEach((l,i)=>{
    const lineLabel = doc.splitTextToSize(l.label, W-ml-mr-90);
    const rowH = Math.max(8, 4.5*lineLabel.length+3);
    if(i%2===1) rc(ml, y, W-ml-mr, rowH, ROWALT);
    sf(9,'normal',[20,20,20]);
    doc.text(lineLabel, ml+3, y+5.5);
    doc.text(String(l.qty), W-mr-58, y+5.5, {align:'center'});
    doc.text(fmtMoney2(l.price), W-mr-32, y+5.5, {align:'right'});
    sf(9,'bold',[20,20,20]);
    doc.text(fmtMoney2(l.qty*l.price), W-mr-3, y+5.5, {align:'right'});
    y += rowH;
  });

  ln(ml, y, W-mr, y, LIGHTGRAY, 0.3);
  y += 8;

  // TOTAL BOX
  const total = docTotal(d);
  rc(W-mr-70, y, 70, 18, DARK);
  sf(9,'normal',ACCENT);
  doc.text('TOTAL TTC', W-mr-65, y+7);
  sf(15,'bold',WHITE);
  doc.text(fmtMoney2(total), W-mr-3, y+13.5, {align:'right'});
  y += 24;

  if(d.type==='devis'){
    const acomptePct = parseFloat(p.acompte)||30;
    const acompteAmount = total*acomptePct/100;
    sf(9,'italic',GRAY);
    doc.text(`Acompte de ${acomptePct}% \u00e0 la signature : ${fmtMoney2(acompteAmount)}`, W-mr, y, {align:'right'});
    y += 8;
  }

  // NOTES
  if(d.notes){
    sf(8,'bold',GRAY);
    doc.text('NOTES', ml, y);
    y += 5;
    sf(9,'normal',[60,60,60]);
    const ls = doc.splitTextToSize(d.notes, W-ml-mr);
    doc.text(ls, ml, y);
    y += 4.5*ls.length + 6;
  }

  // CONDITIONS
  y = Math.max(y, 230);
  sf(8,'bold',GRAY);
  doc.text('CONDITIONS', ml, y);
  y += 5;
  sf(7.5,'normal',GRAY);
  const conds = [
    `\u2022 Annulation < 72h : acompte conserv\u00e9.`,
    `\u2022 D\u00e9placement inclus jusqu\u2019\u00e0 ${p.km||30} km. Au-del\u00e0 : 0,35 \u20ac/km.`,
    `\u2022 ${p.tva || 'TVA non applicable \u2014 art. 293 B du CGI'}.`,
  ];
  conds.forEach(c=>{ const ls=doc.splitTextToSize(c, W-ml-mr); doc.text(ls, ml, y); y += 4*ls.length; });
  y += 6;

  // SIGNATURES
  ln(ml, y, W-mr, y, LIGHTGRAY, 0.3);
  y += 8;
  sf(7,'bold',[20,20,20]);
  doc.text('Bon pour accord \u2014 Signature client', ml, y);
  sf(7,'italic',GRAY);
  doc.text('(Pr\u00e9c\u00e9d\u00e9 de \u00ab Bon pour accord \u00bb)', ml, y+4);
  doc.text('Date : ____________________________', ml, y+11);
  doc.text('Signature :', ml, y+19);
  ln(ml+22, y+19, ml+75, y+19, LIGHTGRAY, 0.3);

  sf(7,'bold',[20,20,20]);
  doc.text('\u00c9mis par', W-mr-55, y);
  sf(7,'normal',[20,20,20]);
  doc.text(p.nom || 'SBSAX', W-mr-55, y+5);
  if(p.email) doc.text(p.email, W-mr-55, y+10);
  if(p.tel) doc.text(p.tel, W-mr-55, y+15);

  // FOOTER
  rc(0, H-10, W, 10, DARK);
  sf(6.5,'normal',[170,170,170]);
  const footerText = `${p.nom||'SBSAX'} \u00b7 ${p.activite||'DJ / Saxophoniste'} \u00b7 SIRET : ${p.siret||'En cours d\u2019immatriculation'} \u00b7 ${p.tva||'TVA non applicable \u2014 art. 293 B du CGI'}`;
  doc.text(footerText, W/2, H-5, {align:'center'});

  const filename = `${d.type==='facture'?'Facture':'Devis'}-${d.num}-${(client.nom||'client').replace(/[^a-z0-9]+/gi,'_')}.pdf`;
  doc.save(filename);
  toast('PDF t\u00e9l\u00e9charg\u00e9');
}

function esc2(s){ return s===undefined||s===null ? '' : String(s); }
function fmtMoney2(n){
  n = Number(n)||0;
  return n.toLocaleString('fr-FR',{minimumFractionDigits:2,maximumFractionDigits:2})+' \u20ac';
}
function fmtDate2(iso){
  if(!iso) return '';
  const dt = new Date(iso);
  return dt.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
